<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="840" viewBox="0 0 1500 840">
  <defs>
    <filter id="shadow" x="-20%" y="-25%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1b2430" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowGray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#9aa5ae" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#48a996" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #fbfbfa; }
      .title { font: 800 50px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #111820; }
      .lane-title { font: 700 30px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #111820; }
      .lane { stroke-width: 2; filter: url(#shadow); }
      .lane1 { fill: #fbfcfa; stroke: #e1e5e1; }
      .lane2 { fill: #fbf8ff; stroke: #ded8ea; }
      .lane3 { fill: #f7fbff; stroke: #d5e4ef; }
      .card { fill: #ffffff; stroke: #edf0f2; stroke-width: 1.2; filter: url(#shadow); }
      .card-title { font: 700 24px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #171d23; }
      .card-sub { font: 16px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #6a7782; }
      .arrow { stroke: #9aa5ae; stroke-width: 3; fill: none; marker-end: url(#arrowGray); }
      .green-arrow { stroke: #48a996; stroke-width: 3; fill: none; marker-end: url(#arrowGreen); }
      .icon { fill: none; stroke: #121820; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .accent { fill: none; stroke: #48a996; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .pill { fill: #ffffff; stroke: #e4e8ec; stroke-width: 1.2; filter: url(#shadow); }
      .pill-text { font: 700 25px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #171d23; }
      .done { fill: #eef8f5; stroke: #48a996; stroke-width: 2; }
      .done-text { font: 700 18px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #2f8d7b; }
    </style>
  </defs>

  <rect class="bg" width="1500" height="840"/>
  <text class="title" x="750" y="72" text-anchor="middle">老照片修复系统处理流程</text>

  <!-- User lane -->
  <text class="lane-title" x="86" y="130">用户操作区</text>
  <rect class="lane lane1" x="70" y="150" width="1360" height="200" rx="34"/>

  <rect class="card" x="135" y="185" width="230" height="135" rx="22"/>
  <g transform="translate(224 205)">
    <path class="icon" d="M26 0 v34"/>
    <path class="icon" d="M11 20 l15 15 l15 -15"/>
    <path class="icon" d="M0 48 h52 v16 h-52 z"/>
  </g>
  <text class="card-title" x="250" y="286" text-anchor="middle">上传照片</text>
  <text class="card-sub" x="250" y="310" text-anchor="middle">选择本地老照片</text>

  <path class="arrow" d="M365 252 H440"/>

  <rect class="card" x="440" y="185" width="230" height="135" rx="22"/>
  <g transform="translate(526 205)">
    <circle class="icon" cx="29" cy="29" r="22"/>
    <circle class="icon" cx="29" cy="29" r="8"/>
    <path class="icon" d="M29 0 v8 M29 50 v8 M0 29 h8 M50 29 h8"/>
  </g>
  <text class="card-title" x="555" y="286" text-anchor="middle">选择模式</text>
  <text class="card-sub" x="555" y="310" text-anchor="middle">超分 / 人脸清晰化</text>

  <path class="arrow" d="M670 252 H745"/>

  <rect class="card" x="745" y="185" width="230" height="135" rx="22"/>
  <g transform="translate(833 207)">
    <rect class="icon" x="0" y="0" width="54" height="42" rx="5"/>
    <path class="icon" d="M27 0 v42"/>
    <path class="accent" d="M8 31 l10 -12 l9 9 l9 -11 l10 14"/>
  </g>
  <text class="card-title" x="860" y="286" text-anchor="middle">查看结果</text>
  <text class="card-sub" x="860" y="310" text-anchor="middle">滑块或并排对比</text>

  <path class="arrow" d="M975 252 H1050"/>

  <rect class="card" x="1050" y="185" width="230" height="135" rx="22"/>
  <g transform="translate(1139 205)">
    <path class="icon" d="M26 0 v34"/>
    <path class="icon" d="M11 20 l15 15 l15 -15"/>
    <path class="icon" d="M0 48 h52 v16 h-52 z"/>
  </g>
  <text class="card-title" x="1165" y="286" text-anchor="middle">保存下载</text>
  <text class="card-sub" x="1165" y="310" text-anchor="middle">存入相册或导出</text>

  <path class="arrow" d="M1280 252 H1340"/>
  <circle class="done" cx="1370" cy="252" r="30"/>
  <text class="done-text" x="1370" y="259" text-anchor="middle">完成</text>

  <!-- Backend lane -->
  <text class="lane-title" x="86" y="418">后端处理区</text>
  <rect class="lane lane2" x="70" y="438" width="1360" height="230" rx="34"/>

  <rect class="card" x="112" y="485" width="205" height="135" rx="22"/>
  <g transform="translate(190 505)">
    <path class="icon" d="M6 0 h37 l16 16 v52 h-53 z"/>
    <path class="icon" d="M43 0 v18 h16"/>
    <path class="icon" d="M17 35 h30 M17 50 h25"/>
  </g>
  <text class="card-title" x="214" y="586" text-anchor="middle">接收请求</text>
  <text class="card-sub" x="214" y="610" text-anchor="middle">保存原图文件</text>

  <path class="green-arrow" d="M317 552 H380"/>

  <rect class="card" x="380" y="485" width="205" height="135" rx="22"/>
  <g transform="translate(455 506)">
    <circle class="icon" cx="28" cy="28" r="23"/>
    <path class="icon" d="M16 29 l8 8 l17 -19"/>
  </g>
  <text class="card-title" x="482" y="586" text-anchor="middle">创建任务</text>
  <text class="card-sub" x="482" y="610" text-anchor="middle">生成修复记录</text>

  <path class="green-arrow" d="M585 552 H648"/>

  <rect class="card" x="648" y="485" width="205" height="135" rx="22"/>
  <g transform="translate(724 505)">
    <circle class="icon" cx="28" cy="28" r="23"/>
    <circle class="icon" cx="28" cy="28" r="8"/>
    <path class="accent" d="M28 3 v9 M28 44 v9 M3 28 h9 M44 28 h9"/>
  </g>
  <text class="card-title" x="750" y="586" text-anchor="middle">异步处理</text>
  <text class="card-sub" x="750" y="610" text-anchor="middle">按模式分发任务</text>

  <path class="green-arrow" d="M853 552 H916"/>

  <rect class="card" x="916" y="485" width="205" height="135" rx="22"/>
  <g transform="translate(996 505)">
    <path class="icon" d="M23 0 C12 2 6 12 8 24 C0 29 1 43 12 48 C14 60 30 63 38 53 V12 C36 4 31 1 23 0 Z"/>
    <path class="icon" d="M44 12 v41 C52 63 68 60 70 48 C81 43 82 29 74 24 C76 12 70 2 59 0"/>
  </g>
  <text class="card-title" x="1018" y="586" text-anchor="middle">模型推理</text>
  <text class="card-sub" x="1018" y="610" text-anchor="middle">调用本地 AI 服务</text>

  <path class="green-arrow" d="M1121 552 H1184"/>

  <rect class="card" x="1184" y="485" width="205" height="135" rx="22"/>
  <g transform="translate(1260 508)">
    <path class="icon" d="M0 29 l20 20 l54 -54"/>
  </g>
  <text class="card-title" x="1286" y="586" text-anchor="middle">返回结果</text>
  <text class="card-sub" x="1286" y="610" text-anchor="middle">更新状态与历史</text>

  <!-- AI lane -->
  <text class="lane-title" x="86" y="735">AI 模型服务区</text>
  <rect class="lane lane3" x="70" y="755" width="1360" height="72" rx="30"/>

  <rect class="pill" x="175" y="770" width="285" height="42" rx="16"/>
  <text class="pill-text" x="317" y="799" text-anchor="middle">Real-ESRGAN 超分增强</text>

  <rect class="pill" x="610" y="770" width="280" height="42" rx="16"/>
  <text class="pill-text" x="750" y="799" text-anchor="middle">GFPGAN 人脸修复</text>

  <rect class="pill" x="1040" y="770" width="285" height="42" rx="16"/>
  <text class="pill-text" x="1182" y="799" text-anchor="middle">SmolVLM 相册分类</text>
</svg>
